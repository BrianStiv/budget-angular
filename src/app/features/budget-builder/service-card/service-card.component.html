<div class="bg-white rounded-2xl border-2 shadow-[0_2px_8px_rgba(0,0,0,0.06)] transition-all duration-300 hover:shadow-[0_4px_12px_rgba(0,0,0,0.1)]" [style.border-color]="isSelected() ? '#28a745' : 'transparent'" [style.background-color]="isSelected() ? '#fafafa' : 'white'">
  <div class="flex items-center gap-6 p-6 md:p-8 cursor-pointer" role="checkbox" [attr.aria-checked]="isSelected()" tabindex="0" (click)="onToggle()" (keydown.enter)="onToggle()" (keydown.space)="onToggle(); $event.preventDefault()">
    <div class="flex-1 min-w-0">
      <h3 class="text-xl font-semibold text-gray-900 mb-1">{{ name() }}</h3>
      <p class="text-sm text-gray-600">{{ description() }}</p>
    </div>
    <div class="flex items-baseline justify-center gap-0.5 min-w-25">
      <span class="text-3xl font-bold text-gray-900">{{ basePrice() }}</span>
      <span class="text-xl font-semibold text-gray-900">€</span>
    </div>
    <div class="flex justify-end min-w-22.5" (click)="$event.stopPropagation()">
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" [checked]="isSelected()" (change)="onToggle()" class="hidden peer" />
        <span class="w-5 h-5 border-2 border-gray-300 rounded flex items-center justify-center transition-all peer-checked:bg-[#28a745] peer-checked:border-[#28a745] peer-checked:after:content-['✓'] peer-checked:after:text-white peer-checked:after:text-sm peer-checked:after:font-bold"></span>
        <span class="text-sm text-gray-600 peer-checked:text-[#28a745] peer-checked:font-medium">Afegir</span>
      </label>
    </div>
  </div>
  @if (hasSubCosts() && isSelected()) {
  <div class="px-6 md:px-8 pb-6 md:pb-8 flex flex-col gap-4" (click)="$event.stopPropagation()">
    @for (subCost of subCosts(); track subCost.id) {
    <app-number-stepper [label]="subCost.label" [value]="subCostValues()[subCost.id] ?? subCost.default" [min]="subCost.min" [max]="subCost.max" (valueChange)="onSubCostChange(subCost.id, $event)" />
    }
  </div>
  }
</div>
