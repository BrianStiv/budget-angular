<button class="px-4 py-2 border-0 bg-transparent text-gray-500 text-sm cursor-pointer rounded-md transition-all duration-200 ease-in-out flex items-center gap-1 hover:bg-gray-100" [class.text-gray-900]="isActive" [class.font-semibold]="isActive" [attr.aria-pressed]="isActive" (click)="onClick()">
  {{ label() }} @if (isActive) { <span class="text-xs">{{ arrow }}</span> }
</button>
