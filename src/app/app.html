<router-outlet></router-outlet>

@if (isHome()) {
  <app-banner></app-banner>

  <main class="w-full max-w-225 mx-auto px-6 pb-15 md:px-4 md:pb-10">
    <div class="flex flex-col gap-0">
      <section class="mb-6">
        <div class="flex flex-col gap-4 mb-2">
          @for (service of services() ?? []; track service.id) {
            <app-service-card
              [id]="service.id"
              [name]="service.name"
              [description]="service.description"
              [basePrice]="service.basePrice"
              [isSelected]="selectionService.isServiceSelected(service.id)"
              [hasSubCosts]="service.hasSubCosts"
              [subCosts]="service.subCosts ?? []"
              [subCostValues]="getServiceSubCostValues(service.id)"
              (toggle)="onToggleService($event)"
              (subCostChange)="onSubCostChange(service.id, $event.subCostId, $event.value)"
            ></app-service-card>
          }
        </div>

        <app-total-display
          [total]="selectionService.totalPrice()"
        ></app-total-display>
      </section>

      @if (selectionService.selectedServices().length > 0) {
        <section class="mb-8">
          <app-client-form></app-client-form>
        </section>
      }

      @if (budgetHistoryService.budgets().length > 0) {
        <section class="pt-2">
          <app-budget-history></app-budget-history>
        </section>
      }
    </div>
  </main>
}
